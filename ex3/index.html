<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de Transporte | João Pedro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; }
    </style>
</head>
<body class="text-slate-900 py-10 px-4">

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black text-orange-600 uppercase tracking-tight">
                <i class="fa-solid fa-bus mr-2"></i> Transporte
            </h1>
            <p class="text-slate-500 font-bold mt-2">Autor: João Pedro</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <div class="bg-white border-4 border-slate-100 p-8 rounded-3xl shadow-xl">
                <div class="mb-6">
                    <label for="contidadeFuncionarios" class="block text-lg font-bold text-slate-800 mb-3">
                        Quantidade de Colaboradores
                    </label>
                    <input type="number" id="contidadeFuncionarios" placeholder="Ex: 120" 
                        class="w-full px-5 py-4 bg-slate-50 border-2 border-orange-200 rounded-2xl focus:border-orange-500 focus:ring-0 focus:outline-none text-2xl font-bold transition-all">
                </div>

                <button id="calcular" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-black py-5 rounded-2xl text-xl shadow-lg shadow-orange-200 transition-transform active:scale-95">
                    CALCULAR VALOR TOTAL
                </button>

                <div class="mt-8 p-6 bg-orange-50 rounded-2xl border-2 border-orange-100">
                    <span class="text-sm font-black text-orange-600 uppercase">Total a Pagar</span>
                    <div id="resultado" class="text-3xl font-black text-slate-800 mt-2">
                        R$ 0,00
                    </div>
                </div>
            </div>

            <div class="flex flex-col h-full">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-bold text-slate-800 uppercase italic">Registro</h2>
                    <button id="limparHistorico" class="bg-red-100 text-red-600 hover:bg-red-600 hover:text-white px-4 py-1 rounded-full text-xs font-bold transition-all">
                        APAGAR TUDO
                    </button>
                </div>

                <div class="bg-slate-50 border-2 border-slate-100 rounded-3xl p-4 flex-1 overflow-hidden">
                    <ul id="historico" class="space-y-3 max-h-[400px] overflow-y-auto pr-2">
                        </ul>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
