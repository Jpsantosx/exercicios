<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transporte de Colaboradores | João Pedro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; }
    </style>
</head>
<body class="text-slate-900 py-10 px-4">

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-orange-100 text-orange-600 rounded-3xl mb-4 shadow-sm">
                <i class="fa-solid fa-bus-simple text-4xl"></i>
            </div>
            <h1 class="text-4xl font-black text-slate-900 tracking-tight">Cálculo de Transporte</h1>
            <p class="text-orange-600 font-bold uppercase tracking-widest text-sm mt-2">Autor: João Pedro</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <section class="bg-white border-4 border-slate-50 p-8 rounded-[2.5rem] shadow-xl shadow-slate-100">
                <div class="space-y-6">
                    <div>
                        <label for="contidadeFuncionarios" class="block text-sm font-black text-slate-700 uppercase mb-2">Quantidade de Funcionários</label>
                        <input type="number" id="contidadeFuncionarios" placeholder="Ex: 50" 
                            class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-200 rounded-2xl focus:border-orange-500 focus:ring-0 outline-none text-xl font-bold transition-all">
                    </div>

                    <div>
                        <label for="quantosdias" class="block text-sm font-black text-slate-700 uppercase mb-2">Quantidade de Dias</label>
                        <input type="number" id="quantosdias" placeholder="Ex: 22" 
                            class="w-full px-5 py-4 bg-slate-50 border-2 border-slate-200 rounded-2xl focus:border-orange-500 focus:ring-0 outline-none text-xl font-bold transition-all">
                    </div>

                    <button id="calcular" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-black py-5 rounded-2xl text-xl shadow-lg shadow-orange-200 transition-transform active:scale-95">
                        CALCULAR AGORA
                    </button>

                    <div class="mt-8 p-6 bg-orange-50 rounded-3xl border-2 border-orange-100 text-center">
                        <span class="text-xs font-black text-orange-600 uppercase tracking-widest">Valor Final Estimado</span>
                        <div id="resultado" class="text-3xl font-black text-slate-900 mt-2">R$ 0,00</div>
                    </div>
                </div>
            </section>

            <section class="flex flex-col h-full">
                <div class="flex items-center justify-between mb-4 px-2">
                    <h2 class="text-xl font-black text-slate-800 uppercase flex items-center gap-2">
                        <i class="fa-solid fa-clock-rotate-left text-orange-500"></i> Histórico
                    </h2>
                    <button id="limparHistorico" class="text-xs font-bold text-red-500 hover:bg-red-50 px-3 py-2 rounded-lg transition-all">
                        LIMPAR TUDO
                    </button>
                </div>

                <div class="bg-slate-50 border-2 border-slate-100 rounded-[2.5rem] p-4 flex-1 overflow-hidden">
                    <ul id="historico" class="space-y-3 max-h-[450px] overflow-y-auto pr-2 custom-scrollbar">
                        </ul>
                </div>
            </section>

        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
