<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Aumento Salarial | João Pedro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #ffffff; 
        }
        /* Estilo suave para o scroll do histórico */
        #historico::-webkit-scrollbar { width: 4px; }
        #historico::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
        
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.3; } }
    </style>
</head>
<body class="text-slate-900 py-10 px-4">

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-black mb-2 tracking-tight">
                Calculadora de Aumento
            </h1>
            <p class="text-slate-600 font-medium">Autor: João Pedro</p>
            
            <div id="relogio-digital" class="mt-4 text-xs font-bold font-mono text-emerald-700 bg-emerald-50 inline-block px-4 py-1.5 rounded-full border border-emerald-200 shadow-sm">
                00:00:00
            </div>
            
            <div class="h-1 w-20 bg-emerald-500 mx-auto mt-6 rounded-full"></div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            
            <section class="bg-slate-50 p-8 rounded-2xl border border-slate-200 shadow-sm">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2 text-slate-800">
                    <i class="fa-solid fa-money-bill-wave text-emerald-600"></i>
                    Dados do Salário
                </h2>
                
                <div class="space-y-6">
                    <div>
                        <label for="salarioFuncionario" class="block text-sm font-bold text-slate-700 mb-2">
                            Salário Atual (R$)
                        </label>
                        <input type="number" id="salarioFuncionario" placeholder="Ex: 2500" 
                            class="w-full px-4 py-4 bg-white border-2 border-slate-300 rounded-xl focus:border-emerald-500 focus:ring-0 focus:outline-none text-xl font-semibold transition-all">
                    </div>

                    <button id="calcular" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl text-lg shadow-md transition-all active:scale-95">
                        Calcular Novo Salário
                    </button>

                    <div class="mt-8 p-6 bg-white border-2 border-emerald-100 rounded-2xl shadow-inner text-center">
                        <span class="text-xs font-bold text-emerald-600 uppercase tracking-widest">Novo Salário Estimado</span>
                        <div id="resultado" class="text-2xl font-black text-slate-800 mt-1 leading-tight">
                            R$ 0,00
                        </div>
                    </div>
                </div>
            </section>

            <section class="flex flex-col">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                        <i class="fa-solid fa-list-ul text-emerald-600"></i>
                        Histórico
                    </h2>
                    <button id="limparHistorico" class="text-sm font-bold text-red-500 hover:text-red-700 transition-colors uppercase tracking-tighter">
                        Limpar Tudo
                    </button>
                </div>

                <div class="bg-slate-50 border border-slate-200 rounded-2xl p-4 flex-1 min-h-[350px]">
                    <ul id="historico" class="space-y-3 max-h-[400px] overflow-y-auto pr-1">
                        </ul>
                </div>
            </section>

        </div>
    </div>

    <script src="script2.js"></script>
</body>
</html>
